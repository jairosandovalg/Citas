<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas Taller Mecánico</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 480px;
            width: 100%;
            border-top: 5px solid #0d6efd;
        }
        h2 { 
            color: #212529; 
            margin-top: 0; 
            text-align: center; 
            font-size: 24px;
        }
        p { 
            color: #6c757d; 
            font-size: 14px; 
            text-align: center; 
            margin-bottom: 25px;
        }
        label { 
            font-weight: 600; 
            display: block; 
            margin-top: 18px; 
            margin-bottom: 6px; 
            color: #495057; 
        }
        select, input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fff;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        /* Estilos para alinear Nombre y Apellido en paralelo */
        .row {
            display: flex;
            gap: 15px;
        }
        .col {
            flex: 1;
        }
        button {
            width: 100%;
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 13px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 22px;
            transition: background-color 0.2s;
        }
        button:hover { 
            background-color: #0b5ed7; 
        }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 500;
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 Reserva de Turno - Taller</h2>
    <p>Selecciona tu horario de atención. Solo se permite el ingreso de un vehículo por turno.</p>
    
    <div class="row">
        <div class="col">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Ej: Juan">
        </div>
        <div class="col">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" placeholder="Ej: Pérez">
        </div>
    </div>

    <label for="correo">Correo Electrónico:</label>
    <input type="email" id="correo" placeholder="juan.perez@example.com">

    <label for="telefono">Teléfono / Celular:</label>
    <input type="tel" id="telefono" placeholder="Ej: 987654321">

    <label for="fecha">Fecha de Reparación:</label>
    <input type="date" id="fecha" onchange="renderHoras()">

    <label for="hora">Elige la Hora:</label>
    <select id="hora">
    </select>

    <label for="observacion">¿Qué problema presenta el vehículo o qué servicio requiere?</label>
    <textarea id="observacion" rows="3" placeholder="Ej: Cambio de pastillas de freno, mantenimiento de los 10k, ruido en el motor..."></textarea>

    <button onclick="registrarTurno()">Confirmar Cupo Exclusivo</button>

    <div id="mensajeExito" class="alert"></div>
</div>

<script>
    // Configurar el calendario restringiendo para que la fecha mínima sea hoy
    const hoyStr = new Date().toISOString().split('T')[0];
    document.getElementById('fecha').min = hoyStr;
    document.getElementById('fecha').value = hoyStr;

    // Estructura de datos: Cada horario inicia con 1 cupo disponible
    let horariosTaller = {
        "08:00 AM": 1,
        "09:00 AM": 1,
        "10:00 AM": 1,
        "11:00 AM": 1,
        "02:00 PM": 1,
        "03:00 PM": 1,
        "04:00 PM": 1,
        "05:00 PM": 1
    };

    // Función encargada de dibujar las horas en el menú desplegable
    function renderHoras() {
        const select = document.getElementById('hora');
        select.innerHTML = ''; // Limpiar opciones previas
        let disponibilidad = false;

        for (const [hora, cupo] of Object.entries(horariosTaller)) {
            // REGLA CRÍTICA: Solo si el cupo es igual a 1, se construye la opción en el HTML
            if (cupo === 1) {
                let opt = document.createElement('option');
                opt.value = hora;
                opt.textContent = hora; // Muestra únicamente la hora limpia (Ej: 09:00 AM)
                select.appendChild(opt);
                disponibilidad = true;
            }
        }

        // Si todos los cupos del objeto están en 0
        if (!disponibilidad) {
            let opt = document.createElement('option');
            opt.textContent = "🔴 Todo ocupado para esta fecha";
            select.appendChild(opt);
        }
    }

    // Función que se ejecuta al hacer clic en el botón de confirmación
    function registrarTurno() {
        const horaSel = document.getElementById('hora').value;
        const nombreNode = document.getElementById('nombre');
        const apellidoNode = document.getElementById('apellido');
        const correoNode = document.getElementById('correo');
        const telefonoNode = document.getElementById('telefono');
        
        // Validación básica de campos obligatorios antes de procesar
        if (!nombreNode.value.trim() || !apellidoNode.value.trim() || !telefonoNode.value.trim()) {
            alert("Por favor, completa tu Nombre, Apellido y Teléfono para agendar la cita.");
            return;
        }

        // Validar que exista una hora seleccionada y que aún tenga su cupo libre
        if (horaSel && horariosTaller[horaSel] === 1) {
            // El cupo pasa inmediatamente a 0 (Ocupado)
            horariosTaller[horaSel] = 0;
            
            // Mostrar la alerta de confirmación en la interfaz
            const alerta = document.getElementById('mensajeExito');
            alerta.textContent = `¡Listo ${nombreNode.value}! Tu vehículo ha sido agendado para las ${horaSel}.`;
            alerta.style.display = 'block';

            // Volver a renderizar el menú (la hora seleccionada se eliminará de la lista)
            renderHoras();
            
            // Limpiar las cajas de texto de datos personales y observaciones
            nombreNode.value = '';
            apellidoNode.value = '';
            correoNode.value = '';
            telefonoNode.value = '';
            document.getElementById('observacion').value = '';
        }
    }

    // Ejecución inicial al cargar la página por primera vez
    renderHoras();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas Taller Mecánico</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 480px;
            width: 100%;
            border-top: 5px solid #0d6efd;
        }
        h2 { color: #212529; margin-top: 0; text-align: center; }
        p { color: #6c757d; font-size: 14px; text-align: center; }
        label { font-weight: 600; display: block; margin-top: 18px; margin-bottom: 6px; color: #495057; }
        select, input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            width: 100%;
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 13px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 22px;
            transition: 0.2s;
        }
        button:hover { background-color: #0b5ed7; }
        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            text-align: center;
            font-weight: 500;
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }
    </style>
</head>
